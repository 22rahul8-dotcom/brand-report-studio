services:
  - type: web
    name: brand-report-studio
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1 --threads 4
    envVars:
      - key: FIRECRAWL_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
